# GroundControl — push notification feed
# POSTs commit metadata to control.lucianlabs.ca so local agents know what
# changed across all repos without polling.
#
# Copy this file to .github/workflows/gc-notify.yml in any repo.
# Requires GC_API_KEY secret set at org or repo level.

name: gc-notify

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect commit metadata
        id: meta
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          AUTHOR="${{ github.actor }}"
          MESSAGE=$(git log -1 --pretty=%s)
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | head -20 | tr '\n' ',' | sed 's/,$//')

          echo "repo=$REPO" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"
          echo "files=$FILES_CHANGED" >> "$GITHUB_OUTPUT"

      - name: Post to GroundControl API
        env:
          GC_API_URL: ${{ vars.GC_API_URL || 'https://control.lucianlabs.ca' }}
          GC_API_KEY: ${{ secrets.GC_API_KEY }}
        run: |
          # POST event to GroundControl central API
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${GC_API_URL}/events" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${GC_API_KEY}" \
            -d '{
              "repo": "${{ steps.meta.outputs.repo }}",
              "branch": "${{ steps.meta.outputs.branch }}",
              "sha": "${{ steps.meta.outputs.sha }}",
              "author": "${{ steps.meta.outputs.author }}",
              "message": "${{ steps.meta.outputs.message }}",
              "files": "${{ steps.meta.outputs.files }}",
              "source": "github-action"
            }' 2>/dev/null) || STATUS="failed"

          if [ "$STATUS" = "201" ]; then
            echo "gc-notify: event posted successfully"
          else
            echo "gc-notify: API returned $STATUS (non-fatal)"
          fi

          # Log to summary for visibility
          echo "### GroundControl Push Event" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Repo:** ${{ steps.meta.outputs.repo }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** ${{ steps.meta.outputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA:** ${{ steps.meta.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Author:** ${{ steps.meta.outputs.author }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Message:** ${{ steps.meta.outputs.message }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Files:** ${{ steps.meta.outputs.files }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API Status:** $STATUS" >> "$GITHUB_STEP_SUMMARY"
